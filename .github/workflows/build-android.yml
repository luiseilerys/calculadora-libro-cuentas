name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'android-app/**'
      - '.github/workflows/build-android.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'android-app/**'
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: android-app/package-lock.json

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install dependencies
      working-directory: android-app
      run: npm ci

    - name: Prebuild Capacitor
      working-directory: android-app
      run: npx cap sync android

    - name: Build Debug APK
      working-directory: android-app/android
      run: ./gradlew assembleDebug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug.apk
        path: android-app/android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Build Release APK (if secrets available)
      if: ${{ secrets.RELEASE_KEYSTORE_BASE64 != null && secrets.RELEASE_KEYSTORE_BASE64 != '' }}
      env:
        RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
        RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
      working-directory: android-app
      run: |
        if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
          echo "Building signed release APK..."
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          
          # Crear archivo gradle.properties con las credenciales de firma
          cat > android/gradle.properties << EOF
RELEASE_STORE_FILE=release.keystore
RELEASE_STORE_PASSWORD=$RELEASE_KEYSTORE_PASSWORD
RELEASE_KEY_ALIAS=$RELEASE_KEY_ALIAS
RELEASE_KEY_PASSWORD=$RELEASE_KEY_PASSWORD
EOF
          
          ./gradlew assembleRelease
        else
          echo "No release keystore found, skipping signed build"
        fi

    - name: Upload Release APK
      if: ${{ secrets.RELEASE_KEYSTORE_BASE64 != null && secrets.RELEASE_KEYSTORE_BASE64 != '' }}
      uses: actions/upload-artifact@v4
      with:
        name: app-release.apk
        path: android-app/android/app/build/outputs/apk/release/app-release.apk
        retention-days: 30

    - name: Create GitHub Release (on tag)
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          android-app/android/app/build/outputs/apk/debug/app-debug.apk
          android-app/android/app/build/outputs/apk/release/app-release.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
