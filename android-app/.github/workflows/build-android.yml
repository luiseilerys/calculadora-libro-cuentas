name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'android-app/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'android-app/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version name (e.g., 1.0.0)'
        required: false
        default: '1.0.0'

env:
  NODE_VERSION: '20.x'
  JAVA_VERSION: '17'
  APP_DIR: './android-app'

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '${{ env.APP_DIR }}/package-lock.json'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 9.0
          packages: 'platform-tools platform-tools-common platforms/android-34 build-tools;34.0.0 cmd-line-tools;latest'

      - name: Install dependencies
        working-directory: ${{ env.APP_DIR }}
        run: |
          npm ci
          npx cap sync

      - name: Create Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ ! -z "$KEYSTORE_BASE64" ]; then
            echo "Using provided keystore from secrets"
            echo "$KEYSTORE_BASE64" | base64 -d > ${{ env.APP_DIR }}/android/app/release-key.keystore
          else
            echo "Generating debug keystore for testing"
            keytool -genkey -v -keystore ${{ env.APP_DIR }}/android/app/debug.keystore \
              -alias androiddebugkey -storepass android -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Configure Gradle Properties
        working-directory: ${{ env.APP_DIR }}/android
        run: |
          cat >> gradle.properties << EOF
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError
          android.useAndroidX=true
          android.enableJetifier=true
          EOF
          
          if [ ! -z "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ]; then
            cat >> gradle.properties << EOF
          RELEASE_STORE_FILE=../app/release-key.keystore
          RELEASE_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF
          fi

      - name: Build Debug APK
        working-directory: ${{ env.APP_DIR }}/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK (if secrets available)
        id: build_release
        continue-on-error: true
        working-directory: ${{ env.APP_DIR }}/android
        env:
          HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          if [ "$HAS_KEYSTORE" = "true" ]; then
            echo "Building signed release APK..."
            ./gradlew assembleRelease --no-daemon --stacktrace
            echo "release_built=true" >> $GITHUB_OUTPUT
          else
            echo "No keystore secrets found, skipping release build"
            echo "release_built=false" >> $GITHUB_OUTPUT
          fi

      - name: Rename APKs
        run: |
          VERSION_NAME=${{ github.event.inputs.version || '1.0.0' }}
          BUILD_TIME=$(date +%Y%m%d_%H%M%S)
          COMMIT_SHA=${GITHUB_SHA::7}
          
          # Rename debug APK
          DEBUG_APK="${{ env.APP_DIR }}/android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$DEBUG_APK" ]; then
            NEW_DEBUG_NAME="MultiCajas-v${VERSION_NAME}-debug-${BUILD_TIME}-${COMMIT_SHA}.apk"
            cp "$DEBUG_APK" "${{ env.APP_DIR }}/$NEW_DEBUG_NAME"
            echo "DEBUG_APK_NAME=$NEW_DEBUG_NAME" >> $GITHUB_ENV
          fi
          
          # Rename release APK if built
          if [ "${{ steps.build_release.outputs.release_built }}" = "true" ]; then
            RELEASE_APK="${{ env.APP_DIR }}/android/app/build/outputs/apk/release/app-release.apk"
            if [ -f "$RELEASE_APK" ]; then
              NEW_RELEASE_NAME="MultiCajas-v${VERSION_NAME}-release-${BUILD_TIME}-${COMMIT_SHA}.apk"
              cp "$RELEASE_APK" "${{ env.APP_DIR }}/$NEW_RELEASE_NAME"
              echo "RELEASE_APK_NAME=$NEW_RELEASE_NAME" >> $GITHUB_ENV
            fi
          fi

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: multicajas-debug-apk
          path: '${{ env.APP_DIR }}/${{ env.DEBUG_APK_NAME }}'
          retention-days: 30
          if-no-files-found: error

      - name: Upload Release APK Artifact
        if: steps.build_release.outputs.release_built == 'true' && env.RELEASE_APK_NAME != ''
        uses: actions/upload-artifact@v4
        with:
          name: multicajas-release-apk
          path: '${{ env.APP_DIR }}/${{ env.RELEASE_APK_NAME }}'
          retention-days: 30

      - name: Create GitHub Release (on tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ env.APP_DIR }}/${{ env.DEBUG_APK_NAME }}
            ${{ env.APP_DIR }}/${{ env.RELEASE_APK_NAME }}
          body: |
            ## 📱 MultiCajas Android APK
            
            ### Version: ${{ github.event.inputs.version || github.ref_name }}
            ### Build: ${{ github.sha }}
            ### Date: $(date)
            
            #### Descargas:
            - **Debug APK**: Para testing y desarrollo
            - **Release APK**: Versión optimizada para producción (requiere keystore configurado)
            
            #### Instalación:
            1. Descarga el archivo APK
            2. En tu dispositivo Android, habilita "Orígenes desconocidos"
            3. Instala el APK descargado
            
            #### Cambios:
            Ver [commits](../commits/${{ github.sha }}) para detalles de cambios.
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Summary
        run: |
          echo "## 📊 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ github.event.inputs.version || '1.0.0' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${GITHUB_SHA::7} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Time | $(date) |" >> $GITHUB_STEP_SUMMARY
          echo "| Debug APK | ✅ Generated |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.build_release.outputs.release_built }}" = "true" ]; then
            echo "| Release APK | ✅ Signed & Generated |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Release APK | ⚠️ Not built (no keystore) |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 Descargas" >> $GITHUB_STEP_SUMMARY
          echo "Los archivos APK están disponibles en la sección de **Artifacts** de este workflow." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔐 Para builds firmados:" >> $GITHUB_STEP_SUMMARY
          echo "Configura los siguientes secrets en tu repositorio:" >> $GITHUB_STEP_SUMMARY
          echo "- \`ANDROID_KEYSTORE_BASE64\`: Tu keystore en base64" >> $GITHUB_STEP_SUMMARY
          echo "- \`ANDROID_KEYSTORE_PASSWORD\`: Contraseña del keystore" >> $GITHUB_STEP_SUMMARY
          echo "- \`ANDROID_KEY_ALIAS\`: Alias de la clave" >> $GITHUB_STEP_SUMMARY
          echo "- \`ANDROID_KEY_PASSWORD\`: Contraseña de la clave" >> $GITHUB_STEP_SUMMARY
